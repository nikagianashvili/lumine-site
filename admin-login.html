<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Lumine</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-mark.svg" />
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/admin.css" />
  </head>
  <body>
    <div class="admin-shell admin-login">
      <div class="login-brand-panel grain">
        <div class="login-brand-content">
          <span class="login-wordmark">LUMINE</span>
          <h1>Run the whole studio from here.</h1>
          <p>Leads, tasks, clients, and the team — one place, every morning.</p>
        </div>
        <p class="login-brand-foot">Internal tool &middot; not for client use</p>
      </div>

      <div class="login-form-panel">
        <form class="admin-login-card" id="loginForm">
          <h2>Sign in</h2>
          <p class="login-form-sub">Welcome back — enter your details.</p>
          <div class="admin-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="username" required placeholder="you@lumine.studio" />
          </div>
          <div class="admin-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
          </div>
          <button type="submit" class="btn btn-solid login-submit" id="loginSubmit">Log in</button>
          <p class="admin-error" id="loginError" hidden></p>
        </form>
      </div>
    </div>
    <script type="module" src="/js/admin-login.js"></script>
  </body>
</html>
