<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service | Lumine | Creative Agency — Tbilisi</title>
    <meta name="author" content="Lumine" />
    <meta name="description" content="A Lumine service — the problem, what we do, and how it runs." />
    <meta name="theme-color" content="#17130f" />
    <meta property="og:title" content="Service — Lumine" />
    <meta property="og:description" content="A Lumine service — the problem, what we do, and how it runs." />
    <meta property="og:type" content="article" />
    <meta property="og:image" content="/logo/lumine-logo-black.png" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon-mark.svg" />
    <link rel="icon" type="image/png" href="/icons/favicon-mark.png" />
    <link rel="stylesheet" href="/css/globals.css" />
    <link rel="stylesheet" href="/css/nav.css" />
    <link rel="stylesheet" href="/css/project.css" />
    <link rel="stylesheet" href="/css/service.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/chat-widget.css" />
    <script src="/js/wrappedgl.js"></script>
    <script src="/js/simulator.js"></script>
  </head>
  <body>
    <!-- service: navigation -->
    <nav>
      <div class="nav-logo">
        <a href="/">
          <img src="/logo/lumine-logo-white.png" alt="Lumine" />
        </a>
      </div>
      <div class="nav-icon">
        <img src="/logo/lumine-mark-2.svg" alt="" />
      </div>
      <div class="nav-right">
        <div class="nav-lang" role="group" aria-label="Language">
          <span class="nav-lang-btn is-active">EN</span>
          <span class="nav-lang-sep">/</span>
          <a href="/ka/services" class="nav-lang-btn" id="navLangKa">GE</a>
        </div>
        <div class="nav-toggler">
          <p>Menu</p>
        </div>
      </div>
    </nav>

    <div id="custom-cursor"></div>

    <!-- service: content, rendered by js/service.js from js/services-data.js -->
    <main class="page" id="svcMain"></main>

    <!-- service: not found (shown if the slug doesn't match a service) -->
    <main class="page pd-not-found" id="svcNotFound" hidden>
      <div class="container">
        <p class="eyebrow">404</p>
        <h2>That Service Isn't On The List</h2>
        <p class="pd-not-found-copy">
          Either the link is old or the slug's wrong. All six are on the
          services page.
        </p>
        <a href="/services" class="btn btn-solid">Back To Services</a>
      </div>
    </main>

    <!-- service: footer -->
    <footer>
      <div id="footer-canvas"></div>
      <div class="footer-inner">
        <div class="footer-cta">
          <span
            class="footer-cta-eyebrow"
            data-animate-variant="slide"
            data-animate-on-scroll="true"
          >
            We Are Listening
          </span>
          <h3
            class="footer-cta-heading"
            data-animate-variant="slide"
            data-animate-on-scroll="true"
            data-animate-delay="0.1"
          >
            Your Next Big Thing Starts Here
          </h3>
        </div>
        <div class="footer-bottom">
          <p class="footer-logo">Lumine</p>
          <p class="footer-copy">Tbilisi, Georgia</p>
        </div>
      </div>
    </footer>

    <script type="module" src="/js/lenis-scroll.js"></script>
    <script type="module" src="/js/cursor.js"></script>
    <script type="module" src="/js/animated-copy.js"></script>
    <script type="module" src="/js/simulation.js"></script>
    <script type="module" src="/js/nav.js"></script>
    <script type="module" src="/js/home-extras.js"></script>
    <script type="module" src="/js/service.js"></script>
    <script type="module" src="/js/footer.js"></script>
    <script type="module" src="/js/chat-widget.js"></script>
  </body>
</html>
