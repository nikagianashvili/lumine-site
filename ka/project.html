    <link rel="icon" type="image/png" href="/icons/favicon-mark.png" />

  <body>
    <!-- project: navigation -->
    <nav>
      <div class="nav-logo">
        <a href="/ka">
          <img src="/logo/lumine-logo-white.png" alt="Lumine" />
        </a>
      </div>
      <div class="nav-icon">
        <img src="/logo/lumine-mark-2.svg" alt="" />
      </div>
      <div class="nav-right">
        <div class="nav-lang" role="group" aria-label="Language">
          <a href="/project" class="nav-lang-btn" id="navLangEn">EN</a>
          <span class="nav-lang-sep">/</span>
          <span class="nav-lang-btn is-active">GE</span>
        </div>
        <div class="nav-toggler">
          <p>Menu</p>
        </div>
      </div>
    </nav>

    <div id="custom-cursor"></div>

    <!-- project: content, rendered by js/project.js from js/projects-data.js -->
    <main class="page sample-project" id="pdMain"></main>

    <!-- project: not found (shown if the slug doesn't match a project) -->
    <main class="page pd-not-found" id="pdNotFound" hidden>
      <div class="container">
        <p class="eyebrow">404</p>
        <h2>ეს პროექტი არქივში არაა</h2>
        <p class="pd-not-found-copy">
          ან ბმული მოძველებულია, ან slug არასწორია. დანარჩენი სამუშაო
          იქვეა, სადაც დატოვე.
        </p>
        <a href="/ka/work" class="btn btn-solid">დაბრუნება არქივში</a>
      </div>
    </main>

    <!-- project: footer -->
    <footer>
      <div id="footer-canvas"></div>
      <div class="footer-inner">
        <div class="footer-cta">
          <span
            class="footer-cta-eyebrow"
            data-animate-variant="slide"
            data-animate-on-scroll="true"
          >
            გისმენთ
          </span>
          <h3
            class="footer-cta-heading"
            data-animate-variant="slide"
            data-animate-on-scroll="true"
            data-animate-delay="0.1"
          >
            თქვენი შემდეგი დიდი საქმე სწორედ აქედან იწყება
          </h3>
        </div>
        <div class="footer-bottom">
          <p class="footer-logo">Lumine</p>
          <p class="footer-copy">თბილისი, საქართველო</p>
        </div>
      </div>
    </footer>

    <script type="module" src="/js/lenis-scroll.js"></script>
    <script type="module" src="/js/cursor.js"></script>
    <script type="module" src="/js/mtavruli.js"></script>
    <script type="module" src="/js/animated-copy.js"></script>
